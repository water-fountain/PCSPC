<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RealShinyHQ SP Calculator</title>
    <style>
        :root {
            --bg: #0d1117;           
            --card: #161b22;         
            /* MASTER BALL PURPLE */
            --poke-red: #6c5ce7;     
            --poke-orange: #f39c12;  
            --text-light: #f0f6fc;
            --border: #30363d;
            --input-bg: #010409;
            --accent-blue: #58a6ff;
            --poke-white: #ffffff; 
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-light);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
            line-height: 1.5;
        }

        .container { width: 100%; max-width: 500px; }

        .header {
            text-align: center;
            border-bottom: 1px solid var(--border);
            margin-bottom: 25px;
            padding-bottom: 20px;
        }

        .header h2 {
            margin: 0;
            letter-spacing: 3px;
            font-weight: 800;
            text-transform: uppercase;
            background: linear-gradient(90deg, var(--poke-red), var(--poke-white));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .calc-card {
            background: var(--card);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        .input-group { margin-bottom: 20px; }

        label {
            display: block;
            font-size: 0.7rem;
            color: #8b949e;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--poke-red);
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.15);
        }

        .mega-container {
            background: rgba(0, 0, 0, 0.2);
            padding: 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
            transition: border-color 0.3s ease;
        }

        .mega-container:has(#megaToggle:checked) {
            border-color: var(--text-light);
            background: rgba(255, 255, 255, 0.03);
        }

        .mega-main-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .mega-sub-options {
            display: none; 
            gap: 24px;
            margin-left: 30px;
            padding-top: 12px;
            margin-top: 12px;
            border-top: 1px solid var(--border);
        }

        .mega-sub-options.visible { display: flex; }

        .mega-sub-options label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-light);
            text-transform: none;
            font-size: 0.9rem;
        }

        #megaToggle, #megaX, #megaY { 
            width: 18px; 
            height: 18px; 
            accent-color: var(--text-light); 
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            transition: transform 0.1s active, opacity 0.2s;
        }

        #calcBtn { 
            background: linear-gradient(135deg, var(--poke-red), #4834d4); 
            color: white;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
        }

        #calcBtn:hover { opacity: 0.9; transform: translateY(-1px); }

        #resetBtn { 
            background: transparent; 
            color: #8b949e; 
            border: 1px solid var(--border);
        }

        #resetBtn:hover { background: rgba(255,255,255,0.05); color: white; }

        .progress-container {
            background: var(--input-bg);
            height: 10px;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        #spBar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--poke-red), var(--poke-white));
            box-shadow: 0 0 12px rgba(108, 92, 231, 0.4);
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .build-item {
            background: var(--card);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border);
            border-left: 4px solid var(--poke-red);
            animation: slideIn 0.3s ease-out;
        }

        .nature-header {
            padding: 15px;
            background: rgba(88, 166, 255, 0.05);
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid rgba(88, 166, 255, 0.2);
            border-left: 4px solid var(--accent-blue);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>REALSHINY HQ</h2>
            <p style="color:var(--text-light); opacity: 0.8; margin:5px 0 0 0; font-weight:800; font-size:0.75rem; letter-spacing: 2px; text-transform: uppercase;">SP Optimization Calculator | M-A REG</p>
        </div>

        <div class="calc-card">
            <div class="input-group">
                <label>Target Species</label>
                <input type="text" id="pokeName" list="pokeList" placeholder="Search Species...">
                <datalist id="pokeList"></datalist>
            </div>

            <div class="mega-container">
                <div class="mega-main-row">
                    <input type="checkbox" id="megaToggle">
                    <label for="megaToggle" style="color:var(--text-light); margin:0; cursor:pointer;">Activate Mega Evolution</label>
                </div>
                <div class="mega-sub-options">
                    <label><input type="checkbox" id="megaX"> Form X</label>
                    <label><input type="checkbox" id="megaY"> Form Y</label>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="input-group">
                    <label>Parameter</label>
                    <select id="statKey">
                        <option value="hp">HP</option>
                        <option value="atk">Attack</option>
                        <option value="def">Defense</option>
                        <option value="spa">Sp. Atk</option>
                        <option value="spd">Sp. Def</option>
                        <option value="spe">Speed</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Alignment</label>
                    <select id="alignment">
                        <option value="1.0">Neutral</option>
                        <option value="1.1">Positive (+)</option>
                        <option value="0.9">Negative (-)</option>
                    </select>
                </div>
            </div>
            
            <div class="input-group">
                <label>Threshold Goal</label>
                <input type="number" id="targetVal" placeholder="Input Value">
            </div>

            <button id="calcBtn">ANALYZE STATS</button>
            <button id="resetBtn">PURGE ALL DATA</button>
            
            <div id="targetWarning" style="display:none; font-size:0.75rem; margin-bottom:12px; font-weight:bold; text-align:center; color: var(--text-light);"></div>
            <div id="result"></div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
            <h3 style="font-size: 0.7rem; color: #8b949e; text-transform: uppercase; margin: 0; letter-spacing: 1px;">
                Wallet Status
            </h3>
            <span style="font-size: 0.85rem; font-weight: bold; color: white;">
                <span id="usedSp">0</span> <span style="color:#8b949e">/ 66 SP</span>
            </span>
        </div>
        
        <div class="progress-container">
            <div id="spBar"></div>
        </div>

        <ul id="build-list" style="list-style: none; padding: 0;"></ul>
    </div>

    <script type="module">
        import { analyzeStats, purgeAllData, populateSpeciesList } from '/src/main.ts';

        document.addEventListener('DOMContentLoaded', () => {
            console.log("RealShiny HQ System Online");

            // Connect search/dropdown logic
            populateSpeciesList();

            // Connect button logic
            document.getElementById('calcBtn')?.addEventListener('click', analyzeStats);
            document.getElementById('resetBtn')?.addEventListener('click', purgeAllData);

            // Handle Mega UI transitions
            const megaToggle = document.getElementById('megaToggle');
            const megaSub = document.querySelector('.mega-sub-options');
            
            megaToggle?.addEventListener('change', () => {
                if (megaToggle.checked) {
                    megaSub?.classList.add('visible');
                } else {
                    megaSub?.classList.remove('visible');
                }
            });
        });
    </script>
</body>
</html>
